<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2048 - Smooth Slide</title>
<style>
  :root{
    --bg:#faf8ef;
    --board:#bbada0;
    --cell:#cdc1b4;
    --text:#776e65;
    --btn:#8f7a66;
    --btn2:#9f8b77;
    --gap:10px;
    --cellSize:90px;
    --boardSize:400px; /* 4*(90)+5*(10)=400 */
    --anim:95ms;
  }
  body{
    margin:0;
    background:var(--bg);
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
  }
  .container{
    width:420px;
    margin-top:40px;
    user-select:none;
  }
  .top{
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  h1{
    margin:0;
    font-size:64px;
    color:var(--text);
  }
  .scoreWrap{ display:flex; gap:6px; }
  .scoreBox{
    background:var(--board);
    color:#fff;
    padding:10px 18px;
    border-radius:6px;
    text-align:center;
    min-width:92px;
  }
  .scoreBox span{
    display:block;
    font-size:12px;
    opacity:.9;
  }
  .scoreBox strong{
    display:block;
    font-size:20px;
    margin-top:2px;
  }
  .buttons{
    margin-top:10px;
    display:flex;
    gap:10px;
  }
  button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:6px;
    background:var(--btn);
    color:#fff;
    cursor:pointer;
    font-weight:700;
  }
  button:hover{ background:var(--btn2); }

  .board{
    margin-top:20px;
    width:var(--boardSize);
    height:var(--boardSize);
    background:var(--board);
    border-radius:8px;
    padding:var(--gap);
    position:relative;
    touch-action:none; /* 觸控更靈敏、避免滑頁 */
  }

  /* 背景格 */
  .cell{
    position:absolute;
    width:var(--cellSize);
    height:var(--cellSize);
    background:var(--cell);
    border-radius:6px;
    z-index: 0;    
  }

  /* tile 層：只移動 transform，不重建 DOM */
  .tileLayer{
    position:absolute;
    left:var(--gap);
    top:var(--gap);
    width:calc(var(--boardSize) - 2*var(--gap));
    height:calc(var(--boardSize) - 2*var(--gap));
    z-index: 1;    
  }
  .tile{
    position:absolute;
    width:var(--cellSize);
    height:var(--cellSize);
    transform: translate(0px, 0px);
    transition: transform var(--anim) cubic-bezier(.2,.8,.2,1);
    will-change: transform;
  }
  .tile .inner{
    width:100%;
    height:100%;
    border-radius:6px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:800;
    font-size:28px;
  }

  .tile.new .inner{ animation: pop 140ms ease; }
  .tile.merge .inner{ animation: mergePop 140ms ease; }

  @keyframes pop{
    0%{ transform: scale(.55); }
    100%{ transform: scale(1); }
  }
  @keyframes mergePop{
    0%{ transform: scale(1); }
    50%{ transform: scale(1.18); }
    100%{ transform: scale(1); }
  }

  .message{
    margin-top:10px;
    text-align:center;
    font-weight:800;
    color:var(--text);
    min-height:22px;
  }

  /* 小提示（可刪） */
  .hint{
    margin-top:8px;
    color:#8a8178;
    font-size:12px;
    text-align:center;
  }
</style>
</head>

<body>
<div class="container">
  <div class="top">
    <h1>2048</h1>
    <div class="scoreWrap">
      <div class="scoreBox"><span>Score</span><strong id="score">0</strong></div>
      <div class="scoreBox"><span>Best</span><strong id="best">0</strong></div>
    </div>
  </div>

  <div class="buttons">
    <button id="btnNew">New Game</button>
    <button id="btnUndo">Undo</button>
  </div>

  <div class="board" id="board">
    <div class="tileLayer" id="tileLayer"></div>
  </div>

  <div class="message" id="message"></div>
  <div class="hint">鍵盤：方向鍵 / WASD　｜　手機：滑動</div>
</div>

<script>
(() => {
  const SIZE = 4;
  const GAP = 10;
  const CELL = 90;
  const ANIM_MS = 95; // 與 CSS var(--anim) 對齊

  const $score = document.getElementById('score');
  const $best  = document.getElementById('best');
  const $msg   = document.getElementById('message');
  const $board = document.getElementById('board');
  const $layer = document.getElementById('tileLayer');
  const $btnNew  = document.getElementById('btnNew');
  const $btnUndo = document.getElementById('btnUndo');

  let tiles = [];          // {id,value,r,c,el}
  let score = 0;
  let best  = Number(localStorage.getItem('best2048_slide') || 0);
  let idCounter = 1;
  let previous = null;     // 單步 undo
  let locked = false;      // 動畫期間鎖定輸入
  let wonShown = false;

  $best.textContent = best;

  function cellPos(r,c){
    // tileLayer 內的座標（已經扣掉 padding）
    return { x: c*(CELL+GAP), y: r*(CELL+GAP) };
  }

  function colorOf(v){
    const colors = {
      2:"#eee4da",4:"#ede0c8",8:"#f2b179",16:"#f59563",
      32:"#f67c5f",64:"#f65e3b",128:"#edcf72",
      256:"#edcc61",512:"#edc850",1024:"#edc53f",
      2048:"#edc22e"
    };
    return colors[v] || "#3c3a32";
  }

  function textColorOf(v){
    return v > 4 ? "#f9f6f2" : "#776e65";
  }

  function createBackground(){
    // 放在 board 上（含 padding），用絕對位置畫 16 格
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.style.left = (GAP + c*(CELL+GAP)) + 'px';
        cell.style.top  = (GAP + r*(CELL+GAP)) + 'px';
        $board.appendChild(cell);
      }
    }
  }

  function makeTileElement(value){
    const el = document.createElement('div');
    el.className = 'tile';
    const inner = document.createElement('div');
    inner.className = 'inner';
    inner.textContent = value;
    inner.style.background = colorOf(value);
    inner.style.color = textColorOf(value);
    el.appendChild(inner);
    $layer.appendChild(el);
    return el;
  }

  function setTileVisual(t){
    const inner = t.el.firstChild;
    inner.textContent = t.value;
    inner.style.background = colorOf(t.value);
    inner.style.color = textColorOf(t.value);
  }

  function placeTile(t, r, c, immediate=false){
    t.r = r; t.c = c;
    const {x,y} = cellPos(r,c);
    if(immediate){
      // 初始/Undo：不想看到動畫就先暫時關 transition
      const prev = t.el.style.transition;
      t.el.style.transition = 'none';
      t.el.style.transform = `translate(${x}px, ${y}px)`;
      // 強制 reflow
      t.el.offsetHeight;
      t.el.style.transition = prev || '';
    }else{
      t.el.style.transform = `translate(${x}px, ${y}px)`;
    }
  }

  function isOccupied(r,c){
    return tiles.some(t => t.r===r && t.c===c);
  }

  function emptyCells(){
    const res=[];
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        if(!isOccupied(r,c)) res.push({r,c});
      }
    }
    return res;
  }

  function addRandomTile(){
    const empties = emptyCells();
    if(empties.length===0) return;
    const p = empties[Math.floor(Math.random()*empties.length)];
    const value = Math.random() < 0.9 ? 2 : 4;
    const t = {
      id: idCounter++,
      value,
      r: p.r,
      c: p.c,
      el: makeTileElement(value)
    };
    t.el.classList.add('new');
    placeTile(t, t.r, t.c, true);
    // 移除 new class，避免下次再動畫
    setTimeout(()=> t.el.classList.remove('new'), 160);
    tiles.push(t);
  }

  function deepSnapshot(){
    return {
      tiles: tiles.map(t => ({id:t.id, value:t.value, r:t.r, c:t.c})),
      score,
      best,
      idCounter,
      wonShown
    };
  }

  function restoreSnapshot(snap){
    // 清空 DOM tiles
    tiles.forEach(t => t.el.remove());
    tiles = [];
    score = snap.score;
    best = snap.best;
    idCounter = snap.idCounter;
    wonShown = snap.wonShown;

    $score.textContent = score;
    $best.textContent = best;

    for(const it of snap.tiles){
      const el = makeTileElement(it.value);
      const t = { id: it.id, value: it.value, r: it.r, c: it.c, el };
      placeTile(t, t.r, t.c, true);
      tiles.push(t);
    }
  }

  function undo(){
    if(locked) return;
    if(!previous) return;
    restoreSnapshot(previous);
    previous = null;
    $msg.textContent = '';
    checkState();
  }

  function newGame(){
    if(locked) return;
    // 清空 tiles
    tiles.forEach(t => t.el.remove());
    tiles = [];
    score = 0;
    wonShown = false;
    previous = null;
    $score.textContent = '0';
    $msg.textContent = '';
    addRandomTile();
    addRandomTile();
    checkState();
  }

  // 產生依方向的 line（每條線上的 tile 依掃描順序）
  function getLines(dir){
    const lines = [];
    if(dir==='left' || dir==='right'){
      for(let r=0;r<SIZE;r++){
        const line=[];
        for(let c=0;c<SIZE;c++){
          const cc = (dir==='left') ? c : (SIZE-1-c);
          const t = tiles.find(x => x.r===r && x.c===cc);
          if(t) line.push(t);
        }
        lines.push({kind:'row', index:r, items:line});
      }
    }else{
      for(let c=0;c<SIZE;c++){
        const line=[];
        for(let r=0;r<SIZE;r++){
          const rr = (dir==='up') ? r : (SIZE-1-r);
          const t = tiles.find(x => x.r===rr && x.c===c);
          if(t) line.push(t);
        }
        lines.push({kind:'col', index:c, items:line});
      }
    }
    return lines;
  }

  function targetPosFromLine(dir, lineKind, lineIndex, slot){
    // slot = 0..(SIZE-1) 代表壓縮後的位置（沿 dir 正向）
    if(dir==='left')  return { r: lineIndex, c: slot };
    if(dir==='right') return { r: lineIndex, c: SIZE-1-slot };
    if(dir==='up')    return { r: slot, c: lineIndex };
    if(dir==='down')  return { r: SIZE-1-slot, c: lineIndex };
  }

  function canMove(){
    if(tiles.length < SIZE*SIZE) return true;
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        const t = tiles.find(x=>x.r===r && x.c===c);
        const right = tiles.find(x=>x.r===r && x.c===c+1);
        const down  = tiles.find(x=>x.r===r+1 && x.c===c);
        if(right && right.value===t.value) return true;
        if(down  && down.value===t.value) return true;
      }
    }
    return false;
  }

  function checkState(){
    // 2048
    if(!wonShown && tiles.some(t => t.value===2048)){
      $msg.textContent = '🎉 達成 2048！(可繼續)';
      wonShown = true;
    }else if($msg.textContent.startsWith('🎉')){
      // keep
    }else{
      $msg.textContent = '';
    }
    if(!canMove()){
      $msg.textContent = 'Game Over';
    }
  }

  function move(dir){
    if(locked) return;

    // 先做 snapshot（只有真的 moved 才保留為 previous）
    const snap = deepSnapshot();

    // 清掉上一回合 merge 標記
    tiles.forEach(t => t.el.classList.remove('merge'));

    const ops = []; // {tile, toR,toC, mergedInto?(tile), removeAfter, newValue?}
    let moved = false;
    let gained = 0;

    const lines = getLines(dir);

    for(const L of lines){
      const items = L.items.slice(); // 掃描順序
      // 合併規則：每回合每格最多合併一次
      let slot = 0;
      for(let i=0;i<items.length;i++){
        const a = items[i];
        const b = items[i+1];

        if(b && a.value === b.value){
          // a 吸收 b
          const {r, c} = targetPosFromLine(dir, L.kind, L.index, slot);
          ops.push({ tile: a, toR:r, toC:c, newValue: a.value*2 });
          ops.push({ tile: b, toR:r, toC:c, removeAfter:true });
          gained += a.value*2;

          // moved?
          if(a.r!==r || a.c!==c) moved = true;
          if(b.r!==r || b.c!==c) moved = true;

          i++; // skip b
          slot++;
        }else{
          const {r, c} = targetPosFromLine(dir, L.kind, L.index, slot);
          ops.push({ tile: a, toR:r, toC:c });
          if(a.r!==r || a.c!==c) moved = true;
          slot++;
        }
      }
    }

    if(!moved){
      // 沒動就不更新 previous
      return;
    }

    // moved：保存 undo snapshot
    previous = snap;

    // 更新分數（先加，動畫後再顯示也行；這裡先更新數字）
    score += gained;
    $score.textContent = String(score);
    if(score > best){
      best = score;
      localStorage.setItem('best2048_slide', String(best));
      $best.textContent = String(best);
    }

    locked = true;

    // 先把所有 tile 移到目標位置（transform 會產生滑動動畫）
    // 注意：先更新 tile 的 r/c 會影響後續查找，所以先記住、再統一改
    const updates = new Map(); // id -> {r,c,newValue,removeAfter}
    for(const op of ops){
      updates.set(op.tile.id, {
        r: op.toR,
        c: op.toC,
        newValue: op.newValue,
        removeAfter: !!op.removeAfter
      });
    }

    // 觸發動畫：用 requestAnimationFrame 確保瀏覽器先完成上一幀
    requestAnimationFrame(() => {
      for(const t of tiles){
        const u = updates.get(t.id);
        if(!u) continue;
        placeTile(t, u.r, u.c, false); // transform animate
      }
    });

    // 動畫結束後 finalize（合併/刪除/生成）
    setTimeout(() => {
      // 先更新 tile 的 r/c 以反映新狀態
      for(const t of tiles){
        const u = updates.get(t.id);
        if(!u) continue;
        t.r = u.r; t.c = u.c;
      }

      // 刪除被吸收的 tile
      const toRemove = new Set();
      for(const t of tiles){
        const u = updates.get(t.id);
        if(u && u.removeAfter) toRemove.add(t.id);
      }

      tiles = tiles.filter(t => {
        if(toRemove.has(t.id)){
          t.el.remove();
          return false;
        }
        return true;
      });

      // 更新合併後的值 + merge 動畫
      for(const t of tiles){
        const u = updates.get(t.id);
        if(u && typeof u.newValue === 'number'){
          t.value = u.newValue;
          setTileVisual(t);
          t.el.classList.add('merge');
          // 移除 merge class（避免下次持續）
          setTimeout(() => t.el.classList.remove('merge'), 170);
        }
      }

      // 生成新 tile
      addRandomTile();

      checkState();
      locked = false;
    }, ANIM_MS + 20);
  }

  // ---- Input ----
  document.addEventListener('keydown', (e) => {
    if(e.repeat) return; // 長按不連發，避免卡
    const k = e.key;
    if(k==='ArrowLeft' || k==='a' || k==='A') move('left');
    else if(k==='ArrowRight' || k==='d' || k==='D') move('right');
    else if(k==='ArrowUp' || k==='w' || k==='W') move('up');
    else if(k==='ArrowDown' || k==='s' || k==='S') move('down');
  });

  // Pointer events (touch + mouse)
  let startX=0, startY=0, tracking=false;
  $board.addEventListener('pointerdown', (e) => {
    if(locked) return;
    tracking = true;
    startX = e.clientX;
    startY = e.clientY;
    $board.setPointerCapture(e.pointerId);
  });

  $board.addEventListener('pointerup', (e) => {
    if(!tracking) return;
    tracking = false;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    const TH = 18; // 閾值越小越靈敏
    if(ax < TH && ay < TH) return;

    if(ax > ay){
      move(dx > 0 ? 'right' : 'left');
    }else{
      move(dy > 0 ? 'down' : 'up');
    }
  });

  $btnNew.addEventListener('click', newGame);
  $btnUndo.addEventListener('click', undo);

  // ---- Boot ----
  createBackground();
  newGame();

})();
</script>
</body>
</html>
